<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="./manifest.json">
    <title>快乐乐园 - 儿童综合游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            position: relative;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 60%, #98FB98 60%, #90EE90 100%);
            overflow: hidden;
        }
        @media (min-width: 768px) {
            #game-container {
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            }
        }
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                max-height: 100vh;
                max-height: 100dvh;
                border-radius: 0;
                overflow: hidden;
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
            .header {
                top: calc(10px + env(safe-area-inset-top));
            }
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 {
            width: 100px; height: 40px; top: 60px; left: 100px;
            animation: float 6s ease-in-out infinite;
        }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 35px; height: 35px; top: -15px; left: 50px; }
        .cloud-2 {
            width: 80px; height: 32px; top: 100px; right: 150px;
            animation: float 8s ease-in-out infinite 1s;
        }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud-2::after { width: 30px; height: 30px; top: -12px; left: 38px; }
        .sun {
            position: absolute;
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            top: 30px; right: 80px;
            box-shadow: 0 0 40px rgba(255,215,0,0.6);
            animation: pulse 3s ease-in-out infinite;
        }
        .rainbow {
            position: absolute;
            top: 120px; left: 50%;
            transform: translateX(-50%);
            width: 400px; height: 60px;
            border: 8px solid transparent;
            border-top-color: #FF6B6B;
            border-radius: 100px 100px 0 0;
            opacity: 0.5;
        }
        .rainbow::before {
            content: '';
            position: absolute;
            top: 16px; left: 16px;
            width: 352px; height: 44px;
            border: 8px solid transparent;
            border-top-color: #FFD93D;
            border-radius: 100px 100px 0 0;
        }
        .rainbow::after {
            content: '';
            position: absolute;
            top: 32px; left: 32px;
            width: 304px; height: 28px;
            border: 8px solid transparent;
            border-top-color: #6BCB77;
            border-radius: 100px 100px 0 0;
        }
        .flower {
            position: absolute;
            width: 20px; height: 20px;
            bottom: 60px;
            background: #FFB6C1;
            border-radius: 50% 50% 50% 50%;
        }
        .flower-1 { left: 120px; }
        .flower-2 { left: 350px; background: #FFD93D; }
        .flower-3 { left: 600px; }
        .flower-4 { left: 850px; background: #DDA0DD; }
        .flower-5 { left: 1050px; }

        /* Floating decorations */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }
        .sparkle {
            width: 10px; height: 10px;
            background: #FFD700;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }
        .sparkle-1 { top: 150px; left: 200px; animation-delay: 0s; }
        .sparkle-2 { top: 250px; left: 900px; animation-delay: 0.3s; }
        .sparkle-3 { top: 350px; left: 150px; animation-delay: 0.6s; }
        .sparkle-4 { top: 180px; right: 300px; animation-delay: 0.9s; }
        .sparkle-5 { top: 400px; right: 200px; animation-delay: 1.2s; }

        .floating-star {
            font-size: 24px;
            animation: float 4s ease-in-out infinite;
        }
        .floating-star-1 { top: 140px; left: 300px; animation-delay: 0s; }
        .floating-star-2 { top: 200px; left: 800px; animation-delay: 1s; }
        .floating-star-3 { top: 300px; left: 1100px; animation-delay: 2s; }

        .header {
            position: fixed;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .back-btn {
            padding: 12px 24px;
            background: rgba(139, 69, 19, 0.8);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }
        .back-btn:hover { transform: scale(1.05); background: rgba(139, 69, 19, 1); }
        .stats { display: flex; align-items: center; gap: 15px; }
        .stars {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px; border-radius: 20px;
            font-size: 22px; font-weight: bold; color: #333;
        }
        .star-icon { font-size: 28px; }
        .difficulty {
            background: rgba(255,255,255,0.9);
            padding: 8px 16px; border-radius: 20px;
            font-size: 18px; color: #333;
        }
        .bgm-toggle {
            background: rgba(255,255,255,0.9);
            padding: 8px 12px; border-radius: 20px;
            border: none; cursor: pointer;
            font-size: 20px; transition: transform 0.2s;
        }
        .bgm-toggle:hover { transform: scale(1.1); }
        .scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }
        .scene.active {
            display: flex;
            flex-direction: column;
        }
        .scene { display: none; }
        #playground.active {
            display: flex;
            flex-direction: column;
        }
        .title {
            position: absolute;
            top: 180px; left: 50%;
            transform: translateX(-50%);
            font-size: 56px; font-weight: bold;
            color: #fff; text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            text-align: center;
        }
        .subtitle { font-size: 24px; color: rgba(255,255,255,0.9); margin-top: 10px; }
        .games-grid {
            position: absolute;
            top: 300px; left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px; width: 950px;
        }
        @media (max-width: 1100px) {
            .games-grid { grid-template-columns: repeat(3, 1fr); width: 700px; }
            .game-card { width: 160px; height: 140px; }
            .game-icon { font-size: 40px; }
        }
        @media (max-width: 800px) {
            .games-grid { grid-template-columns: repeat(2, 1fr); width: 90vw; gap: 10px; top: 220px; }
            .game-card { width: 42vw; height: 80px; }
            .game-icon { font-size: 28px; margin-bottom: 5px; }
            .game-name { font-size: 12px; }
            .title { font-size: 28px; top: 80px; }
            .subtitle { font-size: 14px; }
            .header { top: 5px; left: 5px; right: 5px; }
            .stars { padding: 4px 8px; font-size: 14px; }
            .star-icon { font-size: 18px; }
            .difficulty { padding: 4px 8px; font-size: 12px; }
            .bgm-toggle { padding: 4px 8px; font-size: 16px; }
        }
        @media (max-width: 768px) {
            .scene.active, #playground.active {
                position: relative;
                padding-top: 0;
                height: 100%;
                width: 100%;
            }
            .games-grid {
                position: relative;
                flex: 1;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(3, 1fr);
                gap: 6px;
                width: 100%;
                height: 100%;
                transform: none;
                z-index: 10;
                padding: 8px;
                margin-top: 50px;
            }
            .game-card {
                width: 100%;
                height: 100%;
                min-height: 0;
            }
            .game-icon { font-size: 26px; }
            .game-name { display: none; }
            .title { display: none; }
            .subtitle { display: none; }
            .header { top: calc(6px + env(safe-area-inset-top)); left: 6px; right: 6px; z-index: 100; }
            /* 移动端隐藏装饰元素避免遮挡 */
            .cloud, .sun, .rainbow, .flower, .decoration, .floating-star {
                display: none;
            }
        }
        @media (max-width: 600px) {
            .games-grid {
                gap: 5px;
                padding: 6px;
            }
            .game-icon { font-size: 24px; }
        }
        @media (max-width: 480px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 1fr);
                gap: 5px;
                padding: 6px;
            }
            .game-icon { font-size: 22px; }
        }
        .game-card {
            width: 180px; height: 160px;
            background: white; border-radius: 24px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid transparent;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
            animation: cardFloat 3s ease-in-out infinite;
        }
        .game-card:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }
        .game-card:active {
            transform: scale(0.92);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .game-icon { font-size: 56px; transition: transform 0.2s; }
        .game-card:active .game-icon { transform: scale(1.1); }
        .game-name { font-size: 18px; font-weight: bold; color: #333; }

        /* 卡片浮动动画 */
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            50% { transform: translateY(-5px) rotate(0deg); }
            75% { transform: translateY(-8px) rotate(-2deg); }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        @keyframes rainbowGlow {
            0% { box-shadow: 0 0 20px #FF6B6B; }
            16% { box-shadow: 0 0 20px #FFA94D; }
            33% { box-shadow: 0 0 20px #FFD93D; }
            50% { box-shadow: 0 0 20px #98FB98; }
            66% { box-shadow: 0 0 20px #4DABF7; }
            83% { box-shadow: 0 0 20px #9775FA; }
            100% { box-shadow: 0 0 20px #FF6B6B; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes celebrate {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            75% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .game-card:nth-child(1) { animation-delay: 0s; }
        .game-card:nth-child(2) { animation-delay: 0.3s; }
        .game-card:nth-child(3) { animation-delay: 0.6s; }
        .game-card:nth-child(4) { animation-delay: 0.9s; }
        .game-card:nth-child(5) { animation-delay: 1.2s; }
        .game-card:nth-child(6) { animation-delay: 1.5s; }
        .game-card:nth-child(7) { animation-delay: 1.8s; }

        /* 卡片颜色区分 */
        .game-card[data-game="colorGame"] { background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%); }
        .game-card[data-game="numberGame"] { background: linear-gradient(135deg, #A8EDEA 0%, #FED6E3 100%); }
        .game-card[data-game="shapeGame"] { background: linear-gradient(135deg, #D299C2 0%, #FEF9D7 100%); }
        .game-card[data-game="animalGame"] { background: linear-gradient(135deg, #89F7FE 0%, #66A6FF 100%); }
        .game-card[data-game="puzzleGame"] { background: linear-gradient(135deg, #FAD0C4 0%, #FFD1FF 100%); }
        .game-card[data-game="musicGame"] { background: linear-gradient(135deg, #FFECD2 0%, #FCB69F 100%); }
        .game-card[data-game="drawGame"] { background: linear-gradient(135deg, #A1FFCE 0%, #FAFFD1 100%); }
        .question-area {
            position: absolute;
            top: 15%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 95%;
        }
        .question-text {
            font-size: 36px; color: #333;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }
        /* 隐藏问题文字，改为语音朗读 */
        @media (max-width: 768px) {
            .question-text { display: none; }
            .speaker { width: 80px; height: 80px; font-size: 40px; }
        }
        .color-item {
            width: 100px; height: 100px;
            border-radius: 24px;
            margin: 0 auto 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 50px;
            animation: happyBounce 1s ease-in-out infinite;
        }
        .color-options {
            display: flex; gap: 15px;
            justify-content: center; flex-wrap: wrap;
        }
        .color-btn {
            width: 70px; height: 70px;
            border-radius: 18px;
            border: 4px solid white;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
        }
        .color-btn:active {
            transform: scale(0.88);
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        .color-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        @keyframes itemPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        }
        .color-btn:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .color-btn:active { transform: scale(0.95); }

        @media (max-width: 768px) {
            .question-area { top: 12%; }
            .question-text { font-size: 22px; }
            .color-item { width: 70px; height: 70px; font-size: 35px; }
            .color-btn { width: 55px; height: 55px; border-radius: 12px; }
            .color-options { gap: 8px; }
            .count-item { font-size: 30px; }
            .number-btn { width: 55px; height: 55px; font-size: 22px; }
            .shape-display { width: 90px; height: 90px; }
            .shape-icon { font-size: 45px; }
            .shape-btn { width: 60px; height: 60px; }
            .speaker { width: 60px; height: 60px; font-size: 30px; }
            .animal-options { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .animal-btn { width: 70px; height: 70px; }
            .animal-icon { font-size: 35px; }
            .animal-name { font-size: 11px; }
            .puzzle-piece { width: 60px; height: 60px; font-size: 30px; }
            .piano-key { width: 40px; height: 120px; font-size: 14px; }
            .piano-key.black { width: 30px; height: 70px; margin: 0 -15px; }
            .draw-canvas-wrapper { width: 90vw; height: 50vw; max-width: 400px; }
            .feedback { font-size: 32px; padding: 15px 30px; }
            .music-hint { display: none; }
            .music-target-notes { font-size: 40px; }
        }
        .feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 56px; font-weight: bold;
            color: white; text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            padding: 25px 50px; border-radius: 30px;
            opacity: 0; z-index: 200;
        }
        .feedback.show {
            animation: celebrate 0.6s ease-out forwards;
        }
        .feedback.correct { background: linear-gradient(135deg, #6BCB77, #4CAF50); }
        .feedback.wrong { background: linear-gradient(135deg, #FF6B6B, #FF4757); }

        @keyframes celebrate {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(0.9) rotate(-5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .star-burst { position: absolute; pointer-events: none; z-index: 150; }
        .burst-star {
            position: absolute; font-size: 30px;
            animation: burst 0.8s ease-out forwards;
        }
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        /* Entrance Animations */
        @keyframes slideInDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-50px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(50px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes floatCloud {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-10px) translateX(5px); }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Happy button hover */
        .color-btn:hover, .number-btn:hover, .shape-btn:hover, .animal-btn:hover, .puzzle-piece:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            animation: wiggle 0.3s ease-in-out;
        }
        .color-btn:active, .number-btn:active, .shape-btn:active, .animal-btn:active, .puzzle-piece:active {
            transform: scale(0.9);
            animation: happyBounce 0.3s ease-out;
        }

        /* Game option correct animation */
        .option-correct {
            animation: celebrate 0.5s ease-out forwards !important;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.9) !important;
        }

        /* Game option wrong animation */
        .option-wrong {
            animation: shake 0.4s ease-in-out !important;
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.9) !important;
        }

        /* Rainbow background animation for correct answers */
        .rainbow-bg {
            animation: rainbowGlow 2s ease-in-out infinite;
        }

        .animate-slide-down { animation: slideInDown 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideInUp 0.5s ease-out forwards; }
        .animate-fade-scale { animation: fadeInScale 0.4s ease-out forwards; }
        .animate-bounce { animation: bounceIn 0.6s ease-out forwards; }
        .animate-pop { animation: popIn 0.4s ease-out forwards; }

        .game-card {
            opacity: 0;
            animation: fadeInScale 0.5s ease-out forwards;
        }
        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
        .game-card:nth-child(5) { animation-delay: 0.5s; }
        .game-card:nth-child(6) { animation-delay: 0.6s; }
        .game-card:nth-child(7) { animation-delay: 0.7s; }

        .cloud-1 { animation: floatCloud 6s ease-in-out infinite; }
        .cloud-2 { animation: floatCloud 8s ease-in-out infinite 1s; }
        .sun { animation: pulse 3s ease-in-out infinite; }
        .flower { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }
        .flower-1 { animation-delay: 0s; }
        .flower-2 { animation-delay: 0.5s; }
        .flower-3 { animation-delay: 1s; }
        .flower-4 { animation-delay: 1.5s; }
        .flower-5 { animation-delay: 2s; }

        .star-icon { animation: starSparkle 1s ease-in-out infinite; }
        @keyframes starSparkle {
            0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
            50% { transform: scale(1.2) rotate(15deg); filter: brightness(1.3); }
        }

        /* Question area entrance */
        .question-area { opacity: 0; }
        .question-area.active { animation: slideInDown 0.5s ease-out forwards; }

        /* Button press effect */
        .btn-correct {
            animation: bounceIn 0.4s ease-out;

    <script>
    // Sound Manager
    class SoundManager {
        constructor() {
            this.audioContext = null;
            this.initialized = false;
            this.bgmPlaying = false;
        }

        init() {
            if (this.initialized) return;
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            } catch (e) {
                console.log('Web Audio not supported');
            }
        }

        playClick() {
            this.init();
            if (!this.audioContext) return;
            const osc = this.audioContext.createOscillator();
            const gain = this.audioContext.createGain();
            osc.connect(gain);
            gain.connect(this.audioContext.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, this.audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, this.audioContext.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, this.audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.15);
            osc.start();
            osc.stop(this.audioContext.currentTime + 0.15);
        }

        playCorrect() {
            this.init();
            if (!this.audioContext) return;
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioContext.currentTime);
                const startTime = this.audioContext.currentTime + i * 0.08;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.25, startTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                osc.start(startTime);
                osc.stop(startTime + 0.3);
            });
        }

        playWrong() {
            this.init();
            if (!this.audioContext) return;
            const osc = this.audioContext.createOscillator();
            const gain = this.audioContext.createGain();
            osc.connect(gain);
            gain.connect(this.audioContext.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, this.audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, this.audioContext.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, this.audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.4);
            osc.start();
            osc.stop(this.audioContext.currentTime + 0.4);
        }

        playStar() {
            this.init();
            if (!this.audioContext) return;
            const notes = [988, 1319];
            notes.forEach((freq, i) => {
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioContext.currentTime);
                const startTime = this.audioContext.currentTime + i * 0.1;
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                osc.start(startTime);
                osc.stop(startTime + 0.4);
            });
        }

        playLevelUp() {
            this.init();
            if (!this.audioContext) return;
            const notes = [523, 659, 784, 880, 1047];
            notes.forEach((freq, i) => {
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioContext.currentTime);
                const startTime = this.audioContext.currentTime + i * 0.1;
                gain.gain.setValueAtTime(0.25, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.start(startTime);
                osc.stop(startTime + 0.5);
            });
        }

        playAnimalSound() {
            if ('speechSynthesis' in window) {
                const sounds = ['汪汪汪~汪汪！', '喵~喵~喵！', '哞~我要吃草！', '咯咯哒~咯咯哒！', '嘎嘎嘎~游啊游！', '哼哼哼~我饱饱的！'];
                const text = sounds[Math.floor(Math.random() * sounds.length)];
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.3;
                utterance.volume = 0.9;
                speechSynthesis.speak(utterance);
            }
        }

        speakText(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.2;
                utterance.volume = 1;
                speechSynthesis.speak(utterance);
            }
        }

        playBGM() {
            this.init();
            if (!this.audioContext || this.bgmPlaying) return;
            this.bgmPlaying = true;
            this._playBGMLoop();
        }

        _playBGMLoop() {
            if (!this.bgmPlaying || !this.audioContext) return;
            const melody = [
                { note: 523, duration: 0.3 },
                { note: 587, duration: 0.3 },
                { note: 659, duration: 0.3 },
                { note: 523, duration: 0.3 },
                { note: 523, duration: 0.3 },
                { note: 587, duration: 0.3 },
                { note: 659, duration: 0.3 },
                { note: 523, duration: 0.3 },
                { note: 659, duration: 0.3 },
                { note: 784, duration: 0.3 },
                { note: 880, duration: 0.5 },
                { note: 784, duration: 0.3 },
                { note: 659, duration: 0.3 },
                { note: 523, duration: 0.5 }
            ];
            let time = 0;
            melody.forEach(({ note, duration }) => {
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note, this.audioContext.currentTime + time);
                gain.gain.setValueAtTime(0.08, this.audioContext.currentTime + time);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + time + duration);
                osc.start(this.audioContext.currentTime + time);
                osc.stop(this.audioContext.currentTime + time + duration);
                time += duration;
            });
            const totalDuration = time * 1000;
            setTimeout(() => {
                if (this.bgmPlaying) this._playBGMLoop();
            }, totalDuration);
        }

        stopBGM() {
            this.bgmPlaying = false;
        }
    }

    function createStarBurst() {
        const container = document.getElementById('game-container');
        const centerX = window.innerWidth / 2;

            star.className = 'burst-star';
            star.textContent = ['⭐', '🌟', '✨', '💫'][Math.floor(Math.random() * 4)];
            const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
            const distance = 80 + Math.random() * 80;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance - 30;
            star.style.left = centerX + 'px';
            star.style.top = centerY + 'px';
            star.style.setProperty('--tx', tx + 'px');
            star.style.setProperty('--ty', ty + 'px');
            star.style.fontSize = (20 + Math.random() * 20) + 'px';
            container.appendChild(star);
            setTimeout(() => star.remove(), 800);

                state.difficulty++;
                state.streak = 0;

                soundManager.playStar();

                soundManager.speakText(cheers[Math.floor(Math.random() * cheers.length)]);

        } else {

            if (state.difficulty > 1) state.difficulty--;
            soundManager.playWrong();
            showFeedback(false, '哈哈，再来一次吧～🌟');
            const encouragements = ['哈哈，没关系呀，再试试！', '没关系，勇敢再来一次！', '别灰心，你一定可以的！', '哈哈，再来一次吧～'];
            soundManager.speakText(encouragements[Math.floor(Math.random() * encouragements.length)]);
        }
        updateUI();
        setTimeout(() => startGame(game), 1200);
    }

    // Puzzle Game

        const patternCount = state.difficulty === 1 ? 2 : state.difficulty === 2 ? 3 : 4;
        const gridSize = patternCount + 1;
        const cols = gridSize <= 3 ? 2 : gridSize <= 5 ? 3 : 4;
        const shuffledPatterns = shuffleArray([...puzzlePatterns]).slice(0, gridSize);
        const correct = shuffledPatterns[0];
        state.currentPuzzlePattern = correct;

        // 语音朗读问题

        const grid = document.getElementById('puzzleGrid');
        grid.className = 'puzzle-grid cols-' + cols;
        grid.innerHTML = '';

        const displayItems = shuffleArray([...shuffledPatterns]);
        displayItems.forEach(p => {
            const piece = document.createElement('div');
            piece.className = 'puzzle-piece';
            piece.dataset.name = p.name;
            piece.innerHTML = '<span style="font-size:40px">' + p.emoji + '</span>';
            piece.addEventListener('click', () => selectPuzzlePiece(piece, p.name));
            grid.appendChild(piece);

        optionsEl.innerHTML = '';
        shuffledPatterns.forEach(p => {

    function selectPuzzlePiece(piece, name) {
        document.querySelectorAll('.puzzle-piece').forEach(p => p.classList.remove('selected'));
        piece.classList.add('selected');
        state.selectedPuzzlePiece = name;
        const isCorrect = name === state.currentPuzzlePattern.name;
        if (isCorrect) {
            piece.classList.add('correct');
            soundManager.playCorrect();
        } else {
            piece.classList.add('wrong');
            soundManager.playWrong();
        }
        setTimeout(() => {
            handleAnswer(isCorrect, 'puzzleGame');
        }, 500);

    // Music Game
    function startMusicGame() {
        const seqLength = state.difficulty === 1 ? 2 : state.difficulty === 2 ? 3 : 4;
        state.musicSequence = [];
        state.playerSequence = [];

        for (let i = 0; i < seqLength; i++) {
            state.musicSequence.push(pianoNotes[Math.floor(Math.random() * pianoNotes.length)]);
        }

        // 语音说明
        soundManager.speakText('小音乐家，快来跟我弹钢琴吧！');
        renderPiano();
        showDemoNotes();
        playMusicSequence();
    }

    function renderPiano() {
        const pianoEl = document.getElementById('piano');
        pianoEl.innerHTML = '';
        pianoNotes.forEach((n, i) => {
            const key = document.createElement('div');
            key.className = 'piano-key' + (i >= 4 ? ' black' : '');
            key.textContent = n.note;
            key.dataset.index = i;
            key.addEventListener('click', () => playPianoKey(i));
            key.addEventListener('mousedown', () => key.classList.add('active'));
            key.addEventListener('mouseup', () => key.classList.remove('active'));
            key.addEventListener('mouseleave', () => key.classList.remove('active'));
            pianoEl.appendChild(key);
        });
    }

    function playPianoKey(index, duration = 0.4) {
        const note = pianoNotes[index];
        soundManager.init();
        if (!soundManager.audioContext) return;
        const osc = soundManager.audioContext.createOscillator();
        const gain = soundManager.audioContext.createGain();
        osc.connect(gain);
        gain.connect(soundManager.audioContext.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(note.freq, soundManager.audioContext.currentTime);
        gain.gain.setValueAtTime(0.3, soundManager.audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, soundManager.audioContext.currentTime + duration);
        osc.start();
        osc.stop(soundManager.audioContext.currentTime + duration);

        state.playerSequence.push(index);
        checkMusicAnswer();
    }

    function playMusicSequence() {
        state.isPlayingDemo = true;
        let i = 0;
        const playNext = () => {
            if (i >= state.musicSequence.length) {
                state.isPlayingDemo = false;
                return;
            }
            const idx = pianoNotes.indexOf(state.musicSequence[i]);
            playPianoKey(idx, 0.5);
            i++;
            setTimeout(playNext, 700);
        };
        setTimeout(playNext, 500);
    }

    function showDemoNotes() {
        const target = document.getElementById('musicTarget');
        target.textContent = state.musicSequence.map(n => n.note).join(' - ');
        const demoEl = document.getElementById('demoNotes');
        demoEl.innerHTML = '';
        state.musicSequence.forEach((n, i) => {
            const note = document.createElement('div');
            note.className = 'demo-note';
            note.style.background = n.color;
            note.textContent = n.note;
            note.style.animationDelay = (i * 0.1) + 's';
            demoEl.appendChild(note);
        });
    }

    function checkMusicAnswer() {
        if (state.isPlayingDemo) return;
        const seqLen = state.playerSequence.length;
        const correct = state.playerSequence[seqLen - 1] === pianoNotes.indexOf(state.musicSequence[seqLen - 1]);

        if (!correct) {
            state.playerSequence = [];
            soundManager.playWrong();
            showFeedback(false, '哎呀，再听一次好不好～🔄');
            soundManager.speakText('哎呀，没听清楚呢，再来一次吧！');
            setTimeout(() => {
                state.playerSequence = [];
                playMusicSequence();
            }, 1500);
            return;
        }

        if (seqLen === state.musicSequence.length) {
            soundManager.playCorrect();
            showFeedback(true, '🎵太厉害了！小音乐家就是你！');
            setTimeout(() => startGame('musicGame'), 1500);
        }
    }

    function startDrawGame() {
        drawCanvas = document.getElementById('drawCanvas');
        drawCtx = drawCanvas.getContext('2d');
        drawCtx.fillStyle = 'white';
        drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);

        // 语音说明
        soundManager.speakText('小画家，画个漂亮的图画吧！');

        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const brushLabel = document.getElementById('brushSizeLabel');
        const eraserBtn = document.getElementById('eraserBtn');
        const clearBtn = document.getElementById('clearBtn');

        colorPicker.value = currentDrawColor;
        colorPicker.className = 'color-picker-btn active';
        colorPicker.onclick = () => { isErasing = false; eraserBtn.classList.remove('active'); };

        brushSize.value = currentBrushSize;
        brushLabel.textContent = currentBrushSize + 'px';

        colorPicker.addEventListener('input', (e) => {
            currentDrawColor = e.target.value;
            isErasing = false;
            eraserBtn.classList.remove('active');
        });

        brushSize.addEventListener('input', (e) => {
            currentBrushSize = parseInt(e.target.value);
            brushLabel.textContent = currentBrushSize + 'px';
        });

        eraserBtn.addEventListener('click', () => {
            isErasing = !isErasing;
            eraserBtn.classList.toggle('active', isErasing);
        });

        clearBtn.addEventListener('click', () => {
            drawCtx.fillStyle = 'white';
            drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
            soundManager.playClick();
        });

        drawCanvas.addEventListener('mousedown', startDrawing);
        drawCanvas.addEventListener('mousemove', draw);
        drawCanvas.addEventListener('mouseup', stopDrawing);
        drawCanvas.addEventListener('mouseleave', stopDrawing);
        drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        drawCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        drawCanvas.addEventListener('touchend', stopDrawing);
    }

    function startDrawing(e) {
        isDrawing = true;
        draw(e);
    }

    function stopDrawing() {
        isDrawing = false;
        drawCtx.beginPath();
    }

    function draw(e) {
        if (!isDrawing) return;
        const rect = drawCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (drawCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (drawCanvas.height / rect.height);

        drawCtx.lineWidth = currentBrushSize;
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';

        if (isErasing) {
            drawCtx.globalCompositeOperation = 'destination-out';
            drawCtx.strokeStyle = 'rgba(0,0,0,1)';
        } else {
            drawCtx.globalCompositeOperation = 'source-over';
            drawCtx.strokeStyle = currentDrawColor;
        }

        drawCtx.lineTo(x, y);
        drawCtx.stroke();
        drawCtx.beginPath();
        drawCtx.moveTo(x, y);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    init();
    </script>
